<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPA Trees - Catalogue</title>
  <link rel="icon" type="image/jpg" href="image/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-content">
    <!-- ─── HEADER ─── -->
    <section style="background: linear-gradient(135deg, var(--green) 0%, #1dad78 100%); padding: 90px 5% 70px; text-align: center;">
      <div class="fade-up">
        <div class="section-label" style="color: var(--gold);">Our Catalogue</div>
        <h2 style="color: var(--white); max-width: 700px; margin: 12px auto 20px;">Browse Our Trees</h2>
        <p style="color: rgba(255,255,255,0.75); max-width: 560px; margin: 0 auto; font-size: 1.05rem;">Each tree on campus is documented with its scientific name, common name, family, description, and more.</p>
      </div>
    </section>
    <!-- ─── TREE CATALOGUE ─── -->
    <section class="section section-light">

      <div id="catalogue-feed" class="catalogue-feed"></div>

    </section>
  </div>

  <script src="js/main.js"></script>
  <script src="js/catalogue.js"></script>
</body>
</html>
